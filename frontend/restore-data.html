<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>恢复评测集数据</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { margin: 0 0 20px; color: #333; }
    p { color: #666; margin-bottom: 30px; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .success { color: #16a34a; margin-top: 20px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>评测集数据恢复</h1>
    <p>点击下方按钮恢复默认评测用例数据</p>
    <button onclick="restoreData()">恢复数据</button>
    <p class="success" id="msg">✅ 数据已恢复！<br>请返回评测集详情页面并刷新</p>
  </div>

  <script>
    function restoreData() {
      const EVAL_SET_STORAGE_KEY = "evaluation_sets_demo_v4";
      
      const demoCases = [
        { id: 1, name: "金事通APP下载咨询", content: "你好，我这个是需要重新下载一个金事通app吗？", product: "", history: "", images: [], reference_output: "-" },
        { id: 2, name: "二维码识别咨询", content: "-", product: "", history: "", images: ["https://placehold.co/80x60/e2e8f0/64748b?text=QR"], reference_output: "-" },
        { id: 3, name: "超级玛丽9号投保咨询", content: "有这个情况还可以投保超级玛丽9号防癌吗", product: "超级玛丽9号防癌险", history: "已有2轮对话", images: ["https://placehold.co/80x60/e2e8f0/64748b?text=Doc1", "https://placehold.co/80x60/e2e8f0/64748b?text=Doc2"], reference_output: "-" }
      ];

      function nowString() {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      }

      const allCaseIds = demoCases.map(c => c.id);
      const defaultEvalSet = {
        id: "A-001",
        name: "手小保的评测集",
        type: "app",
        projectApp: "咔嚓保-手小保/手小保",
        targetName: "手小保",
        objectLabel: "手小保",
        desc: "手小保智能助手评测",
        owners: "wisewong,martin",
        updated: nowString(),
        cases: demoCases,
        tasks: [{
          id: "task-001",
          name: "全部用例",
          caseIds: allCaseIds,
          createdAt: nowString(),
          stats: { runRate: 0, checkRate: 0, avgScore: 0 }
        }]
      };

      const sets = [defaultEvalSet];
      localStorage.setItem(EVAL_SET_STORAGE_KEY, JSON.stringify(sets));
      
      document.getElementById('msg').style.display = 'block';
      console.log('数据已恢复:', defaultEvalSet);
    }
  </script>
</body>
</html>
