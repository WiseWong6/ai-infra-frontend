<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>供应商管理</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../js/model-registry.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --line: #e2e8f0;
      --line-soft: #f1f5f9;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #2563eb;
      --blue-soft: #eff6ff;
      --green: #059669;
      --green-soft: #ecfdf5;
      --amber: #d97706;
      --amber-soft: #fffbeb;
      --shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 "MiSans", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    .app { display: flex; min-height: 100vh; }
    .main { flex: 1; min-width: 0; padding: 24px; }
    .shell { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
    .page-head {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
      padding: 24px; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(135deg, #ffffff, #f8fbff 42%, #eef6ff);
      box-shadow: var(--shadow);
    }
    .page-head h1 { margin: 0 0 6px; font-size: 28px; }
    .page-head p { margin: 0; color: var(--muted); max-width: 720px; }
    .stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat {
      min-width: 138px; padding: 14px 16px; border: 1px solid rgba(37, 99, 235, 0.12);
      border-radius: 14px; background: rgba(255,255,255,0.78);
    }
    .stat-label { color: var(--muted); font-size: 12px; }
    .stat-value { margin-top: 6px; font-size: 24px; font-weight: 700; }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow);
    }
    .toolbar { padding: 20px; display: grid; grid-template-columns: 1.2fr 220px 180px auto; gap: 12px; align-items: end; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 13px; color: var(--muted); font-weight: 600; }
    .field input, .field select, .field textarea {
      width: 100%; min-height: 40px; padding: 10px 12px; border: 1px solid var(--line);
      border-radius: 12px; background: #fff; color: var(--text); outline: none;
    }
    .field textarea { min-height: 96px; resize: vertical; }
    .actions { display: flex; gap: 10px; justify-content: flex-end; align-items: center; }
    .btn {
      height: 40px; border: 0; border-radius: 12px; padding: 0 16px; cursor: pointer; font-weight: 600;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn.primary { background: var(--blue); color: #fff; }
    .btn.secondary { background: #0f172a; color: #fff; }
    .btn.ghost { background: #fff; color: var(--text); border: 1px solid var(--line); }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 980px; }
    th, td { padding: 14px 16px; border-bottom: 1px solid var(--line-soft); text-align: left; vertical-align: top; }
    th { font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    td strong { display: block; font-size: 14px; }
    td .sub { margin-top: 4px; color: var(--muted); font-size: 12px; }
    .status {
      display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700;
    }
    .status.active { color: var(--green); background: var(--green-soft); }
    .status.disabled { color: var(--amber); background: var(--amber-soft); }
    .row-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .row-btn {
      height: 32px; border-radius: 10px; border: 1px solid var(--line); background: #fff; color: var(--text);
      padding: 0 12px; cursor: pointer; font-size: 12px; font-weight: 600;
    }
    .empty {
      padding: 48px 24px; text-align: center; color: var(--muted);
    }
    .modal {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      padding: 24px; background: rgba(15, 23, 42, 0.38); backdrop-filter: blur(4px); z-index: 9999;
    }
    .modal.show { display: flex; }
    .panel {
      width: min(720px, 100%); background: #fff; border: 1px solid var(--line); border-radius: 20px;
      box-shadow: 0 32px 96px rgba(15, 23, 42, 0.24); overflow: hidden;
    }
    .panel-head, .panel-foot {
      padding: 18px 20px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between;
    }
    .panel-foot { border-bottom: 0; border-top: 1px solid var(--line); justify-content: flex-end; gap: 10px; }
    .panel-body { padding: 20px; display: grid; gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .toast {
      position: fixed; top: 28px; left: 50%; transform: translateX(-50%) translateY(-8px);
      background: rgba(15, 23, 42, 0.96); color: #fff; padding: 10px 16px; border-radius: 12px;
      opacity: 0; pointer-events: none; transition: all 0.22s ease; z-index: 10000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 1100px) {
      .toolbar { grid-template-columns: 1fr; }
      .stats { width: 100%; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="app">
    <script src="../js/sidebar.js"></script>
    <main class="main">
      <div class="shell">
        <section class="page-head">
          <div>
            <h1>供应商管理</h1>
            <p>管理模型所属供应商的逻辑分组层。这里不维护 baseURL、鉴权或底层协议，只负责供应商主数据、启停状态和模型归属。</p>
          </div>
          <div class="stats">
            <div class="stat">
              <div class="stat-label">供应商总数</div>
              <div class="stat-value" id="supplierCount">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">启用中</div>
              <div class="stat-value" id="activeCount">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">关联模型数</div>
              <div class="stat-value" id="modelCount">0</div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="toolbar">
            <div class="field">
              <label>搜索</label>
              <input id="keywordInput" placeholder="按供应商名称、编码、描述搜索" />
            </div>
            <div class="field">
              <label>状态</label>
              <select id="statusFilter">
                <option value="">全部</option>
                <option value="active">启用中</option>
                <option value="disabled">已禁用</option>
              </select>
            </div>
            <div class="field">
              <label>排序</label>
              <select id="sortField">
                <option value="sort">按排序号</option>
                <option value="name">按名称</option>
              </select>
            </div>
            <div class="actions">
              <button class="btn ghost" id="resetBtn">重置</button>
              <button class="btn secondary" id="seedBtn">恢复默认</button>
              <button class="btn primary" id="createBtn">
                <i data-lucide="plus"></i>
                新建供应商
              </button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>供应商</th>
                  <th>状态</th>
                  <th>说明</th>
                  <th>排序</th>
                  <th>关联模型</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
            <div id="emptyState" class="empty" hidden>暂无符合条件的供应商</div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div class="modal" id="modal">
    <div class="panel">
      <div class="panel-head">
        <div>
          <strong id="modalTitle">新建供应商</strong>
          <div style="font-size:12px;color:var(--muted);margin-top:4px;">用于模型归属、筛选和页面展示。</div>
        </div>
        <button class="row-btn" id="closeModalBtn">关闭</button>
      </div>
      <div class="panel-body">
        <div class="grid-2">
          <div class="field">
            <label>供应商编码</label>
            <input id="supplierCodeInput" placeholder="如 volc / aliyun" />
          </div>
          <div class="field">
            <label>供应商名称</label>
            <input id="supplierNameInput" placeholder="如 火山方舟" />
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label>状态</label>
            <select id="supplierStatusInput">
              <option value="active">启用中</option>
              <option value="disabled">已禁用</option>
            </select>
          </div>
          <div class="field">
            <label>排序</label>
            <input id="sortOrderInput" type="number" placeholder="10" />
          </div>
        </div>
        <div class="field">
          <label>描述</label>
          <textarea id="supplierDescInput" placeholder="说明这个供应商适合哪些模型或场景"></textarea>
        </div>
      </div>
      <div class="panel-foot">
        <button class="btn ghost" id="cancelBtn">取消</button>
        <button class="btn primary" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const {
      getSuppliers,
      saveSuppliers,
      getModels,
      STORAGE_KEYS
    } = window.ModelRegistryDemo;

    const keywordInput = document.getElementById("keywordInput");
    const statusFilter = document.getElementById("statusFilter");
    const sortField = document.getElementById("sortField");
    const tableBody = document.getElementById("tableBody");
    const emptyState = document.getElementById("emptyState");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const supplierCodeInput = document.getElementById("supplierCodeInput");
    const supplierNameInput = document.getElementById("supplierNameInput");
    const supplierStatusInput = document.getElementById("supplierStatusInput");
    const sortOrderInput = document.getElementById("sortOrderInput");
    const supplierDescInput = document.getElementById("supplierDescInput");
    const toast = document.getElementById("toast");

    let editingCode = "";

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function getSupplierModelCount(supplierCode) {
      return getModels({ includeDisabled: true }).filter((item) => item.supplierCode === supplierCode).length;
    }

    function refreshStats() {
      const suppliers = getSuppliers({ includeDisabled: true });
      document.getElementById("supplierCount").textContent = String(suppliers.length);
      document.getElementById("activeCount").textContent = String(suppliers.filter((item) => item.status === "active").length);
      document.getElementById("modelCount").textContent = String(getModels({ includeDisabled: true }).length);
    }

    function getFilteredSuppliers() {
      const keyword = keywordInput.value.trim().toLowerCase();
      const status = statusFilter.value;
      const mode = sortField.value;
      const rows = getSuppliers({ includeDisabled: true }).filter((item) => {
        if (status && item.status !== status) return false;
        if (!keyword) return true;
        return [item.supplierCode, item.supplierName, item.description].some((text) =>
          String(text || "").toLowerCase().includes(keyword)
        );
      });
      rows.sort((a, b) => {
        if (mode === "name") return a.supplierName.localeCompare(b.supplierName, "zh-CN");
        return a.sortOrder - b.sortOrder || a.supplierName.localeCompare(b.supplierName, "zh-CN");
      });
      return rows;
    }

    function renderTable() {
      const rows = getFilteredSuppliers();
      emptyState.hidden = rows.length > 0;
      tableBody.innerHTML = rows.map((item) => `
        <tr>
          <td>
            <strong>${item.supplierName}</strong>
            <div class="sub">${item.supplierCode}</div>
          </td>
          <td>
            <span class="status ${item.status}">${item.status === "active" ? "启用中" : "已禁用"}</span>
          </td>
          <td>${item.description || "-"}</td>
          <td>${item.sortOrder}</td>
          <td>${getSupplierModelCount(item.supplierCode)}</td>
          <td>
            <div class="row-actions">
              <button class="row-btn" data-action="edit" data-code="${item.supplierCode}">编辑</button>
              <button class="row-btn" data-action="toggle" data-code="${item.supplierCode}">
                ${item.status === "active" ? "禁用" : "启用"}
              </button>
            </div>
          </td>
        </tr>
      `).join("");
      refreshStats();
      if (window.lucide?.createIcons) window.lucide.createIcons();
    }

    function openModal(row) {
      editingCode = row?.supplierCode || "";
      modalTitle.textContent = editingCode ? "编辑供应商" : "新建供应商";
      supplierCodeInput.value = row?.supplierCode || "";
      supplierNameInput.value = row?.supplierName || "";
      supplierStatusInput.value = row?.status || "active";
      sortOrderInput.value = String(row?.sortOrder ?? 10);
      supplierDescInput.value = row?.description || "";
      supplierCodeInput.disabled = Boolean(editingCode);
      modal.classList.add("show");
    }

    function closeModal() {
      modal.classList.remove("show");
    }

    function persistSupplier() {
      const code = supplierCodeInput.value.trim();
      const name = supplierNameInput.value.trim();
      if (!code || !name) {
        showToast("请先填写供应商编码和名称");
        return;
      }
      const rows = getSuppliers({ includeDisabled: true });
      const nextRow = {
        supplierCode: code,
        supplierName: name,
        status: supplierStatusInput.value === "disabled" ? "disabled" : "active",
        description: supplierDescInput.value.trim(),
        sortOrder: Number(sortOrderInput.value || 10)
      };
      const nextRows = editingCode
        ? rows.map((item) => item.supplierCode === editingCode ? nextRow : item)
        : rows.concat(nextRow);
      saveSuppliers(nextRows);
      closeModal();
      renderTable();
      showToast(editingCode ? "供应商已更新" : "供应商已创建");
    }

    function toggleStatus(code) {
      const rows = getSuppliers({ includeDisabled: true }).map((item) => {
        if (item.supplierCode !== code) return item;
        return { ...item, status: item.status === "active" ? "disabled" : "active" };
      });
      saveSuppliers(rows);
      renderTable();
      showToast("状态已更新");
    }

    document.getElementById("createBtn").addEventListener("click", () => openModal(null));
    document.getElementById("closeModalBtn").addEventListener("click", closeModal);
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    document.getElementById("saveBtn").addEventListener("click", persistSupplier);
    document.getElementById("seedBtn").addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEYS.suppliers);
      renderTable();
      showToast("已恢复默认供应商数据");
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      keywordInput.value = "";
      statusFilter.value = "";
      sortField.value = "sort";
      renderTable();
    });
    [keywordInput, statusFilter, sortField].forEach((node) => {
      node.addEventListener("input", renderTable);
      node.addEventListener("change", renderTable);
    });
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("show")) closeModal();
    });
    tableBody.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const code = button.dataset.code;
      if (button.dataset.action === "edit") {
        const row = getSuppliers({ includeDisabled: true }).find((item) => item.supplierCode === code);
        openModal(row || null);
      } else if (button.dataset.action === "toggle") {
        toggleStatus(code);
      }
    });

    renderTable();
  </script>
</body>

</html>
